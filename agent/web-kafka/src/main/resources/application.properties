local.config.scan.seconds=10
context.mvc.log.enable=false
apollo.bootstrap.enabled=true
apollo.bootstrap.namespaces=application
apollo.meta=http://dev-apollo.dbcat.com
app.id=gray-demo
server.port=7877
spring.application.name=test-app
context.keys=trace-id,operator-name
logging.level.com.pj=info
logging.level.org.apache.kafka=warn
spring.http.encoding.charset=utf-8
spring.main.allow-bean-definition-overriding=true
spring.kafka.bootstrap-servers=192.168.0.112:9092
#spring.kafka.properties.security.protocol = SASL_PLAINTEXT
#spring.kafka.properties.sasl.mechanism = SCRAM-SHA-256
#spring.kafka.properties.sasl.jaas.config = org.apache.kafka.common.security.scram.ScramLoginModule required username="xxx" password="xxx";
spring.kafka.producer.key-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.batch-size=65536
spring.kafka.producer.buffer-memory=524288
# consumer config
spring.kafka.consumer.group-id=gray-test-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.concurrency=2










